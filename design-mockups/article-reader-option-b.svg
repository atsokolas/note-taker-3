<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F4EFE6"/>
  <rect x="34" y="20" width="1532" height="54" rx="16" fill="#FBF8F2" stroke="#D9CCB6"/>
  <rect x="210" y="31" width="460" height="31" rx="16" fill="#F1EADF" stroke="#D9CCB6"/>
  <text x="230" y="50" font-size="14" fill="#8F806D" font-family="Arial">Search notes and highlights...</text>

  <rect x="34" y="96" width="186" height="770" rx="16" fill="#FBF8F2" stroke="#D9CCB6"/>
  <rect x="246" y="96" width="1320" height="770" rx="20" fill="#FBF8F2" stroke="#D9CCB6"/>

  <text x="286" y="146" font-size="58" fill="#3F3428" font-family="Georgia">Flounder Mode</text>
  <text x="288" y="182" font-size="15" fill="#8F806D" font-family="Arial">Reading + Highlights Rail</text>

  <rect x="286" y="220" width="892" height="602" rx="14" fill="#FFFDF8" stroke="#DDCFB8"/>
  <g font-family="Georgia" fill="#3F3428" font-size="22">
    <text x="330" y="272">Kevin Kelly is not known for one big thing, and that is the point of the work.</text>
    <rect x="328" y="288" width="680" height="30" rx="6" fill="#E6DECB" stroke="#D5C7AD"/>
    <text x="330" y="312">He is as intelligent, hard-working, and patient as history's iconic makers.</text>
    <text x="330" y="360">Instead, he works Hollywood style in a series of long-running projects.</text>
    <text x="330" y="406">Kelly was an editor of the Whole Earth Catalog in the early 1980s.</text>
    <text x="330" y="452">He helped start WELL, one of the first online communities in 1985.</text>
    <rect x="328" y="468" width="712" height="30" rx="6" fill="#E6DECB" stroke="#D5C7AD"/>
    <text x="330" y="492">He co-founded WIRED magazine in 1993 and wrote a dozen books.</text>
    <text x="330" y="540">He is known for sustained curiosity and patient systems thinking.</text>
  </g>

  <rect x="1200" y="220" width="340" height="602" rx="14" fill="#F7F1E6" stroke="#DCCDB4"/>
  <text x="1228" y="258" font-size="28" fill="#3F3428" font-family="Georgia">Highlights</text>
  <g font-family="Arial" font-size="14" fill="#3F3428">
    <rect x="1224" y="286" width="292" height="78" rx="10" fill="#F1EADF" stroke="#D9CCB6"/>
    <text x="1240" y="312">He works Hollywood style...</text><text x="1240" y="332" fill="#8F806D">Capture as concept</text>
    <rect x="1224" y="378" width="292" height="78" rx="10" fill="#F1EADF" stroke="#D9CCB6"/>
    <text x="1240" y="404">Co-founded WIRED in 1993...</text><text x="1240" y="424" fill="#8F806D">Add to question</text>
    <rect x="1224" y="470" width="292" height="78" rx="10" fill="#F1EADF" stroke="#D9CCB6"/>
    <text x="1240" y="496">Long timeline curiosity...</text><text x="1240" y="516" fill="#8F806D">Send to notebook</text>
    <rect x="1224" y="562" width="292" height="78" rx="10" fill="#F1EADF" stroke="#D9CCB6"/>
    <text x="1240" y="588">Bike across the U.S....</text><text x="1240" y="608" fill="#8F806D">Tag and archive</text>
  </g>

  <text x="286" y="846" font-size="14" fill="#7C694F" font-family="Arial">Option B  Reader + Highlights Rail: keeps context close without bouncing to the right drawer.</text>
</svg>
