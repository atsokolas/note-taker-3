  <rect x="246" y="96" width="1060" height="770" rx="20" fill="#FBF8F2" stroke="#D9CCB6"/>
  <text x="286" y="146" font-size="58" fill="#3F3428" font-family="Georgia">Flounder Mode</text>
  <text x="288" y="182" font-size="15" fill="#8F806D" font-family="Arial">Oct 19, 2025  •  Open source</text>

  <rect x="286" y="220" width="982" height="602" rx="14" fill="#FFFDF8" stroke="#DDCFB8"/>
  <g font-family="Georgia" fill="#3F3428" font-size="22">
    <text x="352" y="274">Kevin Kelly is not known for one big thing, and that is the point of the work.</text>
    <text x="352" y="320">He is as intelligent, hard-working, and patient as history's iconic makers.</text>
    <rect x="350" y="338" width="728" height="30" rx="6" fill="#E6DECB" stroke="#D5C7AD"/>
    <text x="352" y="362">Instead, in his words, he works Hollywood style in a series of projects.</text>
    <text x="352" y="410">Kelly was an editor of the Whole Earth Catalog in the early 1980s.</text>
    <text x="352" y="456">He helped start WELL, one of the first online communities in 1985.</text>
    <text x="352" y="502">He co-founded WIRED magazine in 1993 and wrote a dozen books.</text>
    <rect x="350" y="520" width="660" height="30" rx="6" fill="#E6DECB" stroke="#D5C7AD"/>
    <text x="352" y="544">He rides a bike across the United States and draws deep analogies.</text>
    <text x="352" y="592">What matters most is his sustained curiosity over long timelines.</text>
    <text x="352" y="638">This mode emphasizes stillness, margin, and uninterrupted reading.</text>
  </g>

  <text x="286" y="846" font-size="14" fill="#7C694F" font-family="Arial">Option A  Quiet Reader Focus: narrower text measure, softer paper card, lower UI noise.</text>
</svg>
