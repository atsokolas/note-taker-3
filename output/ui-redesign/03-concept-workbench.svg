<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <rect width="1440" height="900" fill="#f7f1e8"/>
  <rect x="0" y="0" width="1440" height="74" fill="#f2e8d8"/>
  <text x="54" y="45" font-family="Georgia, serif" font-size="30" fill="#2f261f">Noeis</text>

  <rect x="34" y="110" width="162" height="710" rx="28" fill="#f4ebdd"/>
  <text x="60" y="172" font-family="Arial, sans-serif" font-size="16" fill="#8d7963">Think</text>
  <text x="60" y="212" font-family="Arial, sans-serif" font-size="16" fill="#7a6857">Concepts</text>
  <line x1="60" y1="224" x2="144" y2="224" stroke="#9e8462" stroke-width="2"/>
  <text x="60" y="252" font-family="Arial, sans-serif" font-size="16" fill="#8d7963">Questions</text>

  <text x="230" y="142" font-family="Arial, sans-serif" font-size="14" letter-spacing="2" fill="#9e8462">CONCEPT WORKBENCH</text>
  <text x="230" y="198" font-family="Georgia, serif" font-size="58" fill="#2f261f">Blah</text>
  <text x="230" y="234" font-family="Arial, sans-serif" font-size="22" fill="#7a6857">The concept page should revolve around the claim, its support, and what changed after each pass.</text>

  <rect x="230" y="278" width="760" height="188" rx="28" fill="#fbf7f0" stroke="#dccbb5"/>
  <text x="272" y="326" font-family="Arial, sans-serif" font-size="14" letter-spacing="2" fill="#9e8462">CURRENT CLAIM</text>
  <text x="272" y="392" font-family="Georgia, serif" font-size="38" fill="#2f261f">Strong organizations decay when prior success hardens the filters that once made them adaptive.</text>
  <rect x="272" y="418" width="118" height="28" rx="14" fill="#efe4d2"/>
  <text x="302" y="437" font-family="Arial, sans-serif" font-size="14" fill="#2f261f">Revision 13</text>
  <rect x="404" y="418" width="152" height="28" rx="14" fill="#fbf7f0" stroke="#d8c5ad"/>
  <text x="434" y="437" font-family="Arial, sans-serif" font-size="14" fill="#7a6857">1 contradiction open</text>

  <rect x="230" y="500" width="760" height="318" rx="28" fill="#fbf7f0" stroke="#dccbb5"/>
  <text x="272" y="548" font-family="Arial, sans-serif" font-size="14" letter-spacing="2" fill="#9e8462">DRAFT SURFACE</text>
  <rect x="272" y="582" width="674" height="160" rx="20" fill="#f7f1e8" stroke="#dfcfba"/>
  <text x="304" y="632" font-family="Georgia, serif" font-size="29" fill="#56473a">The argument grows here. Evidence should arrive as pull quotes and annotated excerpts beside the prose,</text>
  <text x="304" y="670" font-family="Georgia, serif" font-size="29" fill="#56473a">not in a separate retrieval dump. Contradictions stay visible until resolved or accepted.</text>
  <rect x="272" y="760" width="164" height="34" rx="17" fill="#efe4d2"/>
  <text x="320" y="782" font-family="Arial, sans-serif" font-size="16" fill="#2f261f">Challenge claim</text>
  <rect x="454" y="760" width="172" height="34" rx="17" fill="#fbf7f0" stroke="#d8c5ad"/>
  <text x="498" y="782" font-family="Arial, sans-serif" font-size="16" fill="#7a6857">Find evidence</text>
  <rect x="644" y="760" width="164" height="34" rx="17" fill="#fbf7f0" stroke="#d8c5ad"/>
  <text x="688" y="782" font-family="Arial, sans-serif" font-size="16" fill="#7a6857">Save version</text>

  <rect x="1022" y="278" width="354" height="540" rx="28" fill="#f4ebdd"/>
  <text x="1060" y="326" font-family="Arial, sans-serif" font-size="14" letter-spacing="2" fill="#9e8462">PROVENANCE RAIL</text>
  <text x="1060" y="372" font-family="Georgia, serif" font-size="32" fill="#2f261f">What changed</text>
  <text x="1060" y="420" font-family="Arial, sans-serif" font-size="20" fill="#7a6857">Latest pass</text>
  <text x="1060" y="452" font-family="Arial, sans-serif" font-size="22" fill="#2f261f">Clarified causal claim and surfaced a remaining risk.</text>
  <line x1="1060" y1="484" x2="1330" y2="484" stroke="#d8c5ad" stroke-width="2"/>
  <text x="1060" y="530" font-family="Arial, sans-serif" font-size="20" fill="#7a6857">Support added</text>
  <text x="1060" y="562" font-family="Arial, sans-serif" font-size="22" fill="#2f261f">2 excerpts from library</text>
  <text x="1060" y="612" font-family="Arial, sans-serif" font-size="20" fill="#7a6857">Pressure point</text>
  <text x="1060" y="644" font-family="Arial, sans-serif" font-size="22" fill="#2f261f">Counterexample from Intel note remains unresolved.</text>
  <text x="1060" y="708" font-family="Arial, sans-serif" font-size="20" fill="#7a6857">The agent rail should read like scientific apparatus: deltas, evidence, and uncertainty.</text>
</svg>
