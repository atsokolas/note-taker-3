<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <rect width="1440" height="900" fill="#f6f0e6"/>
  <rect x="0" y="0" width="1440" height="74" fill="#f1e8da"/>
  <rect x="34" y="26" width="110" height="26" rx="13" fill="#eadfce"/>
  <text x="55" y="43" font-family="Georgia, serif" font-size="28" fill="#2f261f">Noeis</text>
  <text x="240" y="45" font-family="Arial, sans-serif" font-size="16" fill="#7a6857">Visual Thesis</text>
  <text x="240" y="230" font-family="Georgia, serif" font-size="76" fill="#2f261f">A reading room for live thought.</text>
  <text x="240" y="282" font-family="Arial, sans-serif" font-size="26" fill="#7a6857">Less dashboard. More desk, archive, and argument in motion.</text>
  <line x1="240" y1="330" x2="1190" y2="330" stroke="#d9c9b2" stroke-width="2"/>

  <rect x="240" y="382" width="290" height="380" rx="28" fill="#fbf7f0" stroke="#dccbb5"/>
  <text x="278" y="430" font-family="Arial, sans-serif" font-size="14" letter-spacing="2" fill="#9e8462">MATERIAL</text>
  <text x="278" y="486" font-family="Georgia, serif" font-size="38" fill="#2f261f">Warm paper</text>
  <text x="278" y="530" font-family="Arial, sans-serif" font-size="22" fill="#7a6857">Editorial serif for ideas.</text>
  <text x="278" y="562" font-family="Arial, sans-serif" font-size="22" fill="#7a6857">Quiet sans for action and state.</text>
  <circle cx="318" cy="640" r="26" fill="#2f261f"/>
  <circle cx="392" cy="640" r="26" fill="#a38258"/>
  <circle cx="466" cy="640" r="26" fill="#ddd1bd"/>

  <rect x="574" y="382" width="290" height="380" rx="28" fill="#fbf7f0" stroke="#dccbb5"/>
  <text x="612" y="430" font-family="Arial, sans-serif" font-size="14" letter-spacing="2" fill="#9e8462">HIERARCHY</text>
  <text x="612" y="486" font-family="Georgia, serif" font-size="38" fill="#2f261f">One loud surface</text>
  <rect x="612" y="528" width="214" height="84" rx="18" fill="#efe4d2"/>
  <text x="640" y="580" font-family="Georgia, serif" font-size="28" fill="#2f261f">Main claim</text>
  <rect x="612" y="634" width="126" height="22" rx="11" fill="#f6efe2" stroke="#d7c4ac"/>
  <rect x="758" y="634" width="68" height="22" rx="11" fill="#f6efe2" stroke="#d7c4ac"/>
  <text x="612" y="702" font-family="Arial, sans-serif" font-size="22" fill="#7a6857">Everything else supports it.</text>

  <rect x="908" y="382" width="290" height="380" rx="28" fill="#fbf7f0" stroke="#dccbb5"/>
  <text x="946" y="430" font-family="Arial, sans-serif" font-size="14" letter-spacing="2" fill="#9e8462">BEHAVIOR</text>
  <text x="946" y="486" font-family="Georgia, serif" font-size="38" fill="#2f261f">Visible reasoning</text>
  <line x1="946" y1="544" x2="1160" y2="544" stroke="#d9c9b2" stroke-width="2"/>
  <text x="946" y="590" font-family="Arial, sans-serif" font-size="22" fill="#7a6857">Evidence enters beside the draft.</text>
  <text x="946" y="626" font-family="Arial, sans-serif" font-size="22" fill="#7a6857">Contradictions stay attached.</text>
  <text x="946" y="662" font-family="Arial, sans-serif" font-size="22" fill="#7a6857">Agent work becomes deltas, not chat logs.</text>
  <text x="240" y="832" font-family="Arial, sans-serif" font-size="20" fill="#a38258">Reference board: off-white field, restrained borders, one dominant content plane, right rail reduced to provenance and next move.</text>
</svg>
