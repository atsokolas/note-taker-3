<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF8F3"/>
      <stop offset="1" stop-color="#F3EEE5"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#B7AA95" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    .serif { font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif; }
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .micro { font-size: 12px; letter-spacing: 1.4px; text-transform: uppercase; font-weight: 700; fill: #A0907A; }
    .small { font-size: 14px; font-weight: 500; fill: #97856E; }
    .body { font-size: 17px; font-weight: 500; fill: #615544; }
    .nav { font-size: 15px; font-weight: 600; fill: #6E624F; }
    .navStrong { font-size: 15px; font-weight: 700; fill: #372E24; }
    .title { font-size: 60px; font-weight: 700; fill: #31271D; }
    .section { font-size: 30px; font-weight: 700; fill: #3F3428; }
    .cardTitle { font-size: 20px; font-weight: 700; fill: #46382B; }
  </style>

  <rect width="1600" height="1080" fill="url(#bg)"/>

  <rect x="34" y="28" width="1532" height="56" rx="22" fill="#FBF9F5" stroke="#E5DBCD"/>
  <text x="60" y="62" class="sans navStrong">Noeis</text>
  <text x="180" y="62" class="sans nav">Think</text>
  <text x="242" y="62" class="sans small">/</text>
  <text x="262" y="62" class="sans navStrong">Concept</text>
  <rect x="560" y="40" width="430" height="32" rx="16" fill="#F4EFE7"/>
  <text x="584" y="61" class="sans small">Search this concept only</text>
  <text x="1310" y="62" class="sans small">Share</text>
  <text x="1370" y="62" class="sans small">Export</text>
  <text x="1444" y="62" class="sans small">•••</text>

  <rect x="116" y="122" width="1368" height="900" rx="36" fill="#FCFBF8" stroke="#E5DBCD" filter="url(#softShadow)"/>

  <rect x="156" y="156" width="146" height="36" rx="18" fill="#F1EBE1"/>
  <text x="188" y="179" class="sans navStrong">Concept</text>
  <text x="326" y="180" class="sans nav">Notebook</text>

  <text x="156" y="240" class="sans micro">Concept</text>
  <text x="156" y="320" class="serif title">Thinking tools should feel like instruments</text>
  <text x="156" y="370" class="sans body">A place to hold one idea while it becomes clearer.</text>

  <line x1="156" y1="414" x2="826" y2="414" stroke="#E8DED1"/>

  <text x="156" y="466" class="sans micro">Current question</text>
  <text x="156" y="518" class="serif section">What belongs inside the concept, and what belongs outside it?</text>

  <text x="156" y="592" class="sans micro">Working thought</text>
  <text x="156" y="638" class="sans body">Notebook is where fragments accumulate.</text>
  <text x="156" y="670" class="sans body">Concept is where a frame appears and starts judging what matters.</text>
  <text x="156" y="702" class="sans body">Thought partner and memory stay available, but quiet, until invited in.</text>

  <line x1="156" y1="744" x2="826" y2="744" stroke="#E8DED1"/>

  <text x="156" y="792" class="sans micro">In frame</text>

  <rect x="156" y="824" width="210" height="118" rx="22" fill="#F7F2EA"/>
  <text x="180" y="858" class="serif cardTitle">Bret Victor</text>
  <text x="180" y="888" class="sans small">Make the invisible visible.</text>
  <text x="180" y="912" class="sans small">Keep context on screen.</text>

  <rect x="390" y="824" width="210" height="118" rx="22" fill="#F7F2EA"/>
  <text x="414" y="858" class="serif cardTitle">Are.na</text>
  <text x="414" y="888" class="sans small">A concept starts with 3-5 things.</text>
  <text x="414" y="912" class="sans small">The fourth item changes the frame.</text>

  <rect x="624" y="824" width="210" height="118" rx="22" fill="#F7F2EA"/>
  <text x="648" y="858" class="serif cardTitle">Chetan</text>
  <text x="648" y="888" class="sans small">Make value obvious quickly.</text>
  <text x="648" y="912" class="sans small">Pain before feature.</text>

  <circle cx="270" cy="780" r="4" fill="#B59E82"/>
  <circle cx="504" cy="780" r="4" fill="#B59E82"/>
  <circle cx="738" cy="780" r="4" fill="#B59E82"/>
  <line x1="270" y1="780" x2="260" y2="824" stroke="#D1C2AF" stroke-width="2"/>
  <line x1="504" y1="780" x2="495" y2="824" stroke="#D1C2AF" stroke-width="2"/>
  <line x1="738" y1="780" x2="729" y2="824" stroke="#D1C2AF" stroke-width="2"/>

  <text x="928" y="240" class="sans micro">Canvas</text>
  <rect x="928" y="272" width="426" height="574" rx="28" fill="#FFFDFC" stroke="#ECE3D7"/>
  <text x="966" y="324" class="serif section">Draft</text>
  <line x1="966" y1="352" x2="1316" y2="352" stroke="#EEE6DB"/>
  <line x1="966" y1="392" x2="1316" y2="392" stroke="#EEE6DB"/>
  <line x1="966" y1="432" x2="1316" y2="432" stroke="#EEE6DB"/>
  <line x1="966" y1="472" x2="1316" y2="472" stroke="#EEE6DB"/>
  <line x1="966" y1="512" x2="1316" y2="512" stroke="#EEE6DB"/>
  <line x1="966" y1="552" x2="1316" y2="552" stroke="#EEE6DB"/>
  <line x1="966" y1="592" x2="1316" y2="592" stroke="#EEE6DB"/>
  <line x1="966" y1="632" x2="1316" y2="632" stroke="#EEE6DB"/>
  <line x1="966" y1="672" x2="1316" y2="672" stroke="#EEE6DB"/>
  <line x1="966" y1="712" x2="1316" y2="712" stroke="#EEE6DB"/>
  <line x1="966" y1="752" x2="1316" y2="752" stroke="#EEE6DB"/>
  <line x1="966" y1="792" x2="1316" y2="792" stroke="#EEE6DB"/>
  <text x="966" y="892" class="sans micro">Quiet actions</text>
  <text x="966" y="928" class="sans small">/add source</text>
  <text x="1080" y="928" class="sans small">/connect</text>
  <text x="1180" y="928" class="sans small">/return later</text>

  <rect x="1368" y="282" width="76" height="42" rx="21" fill="#F3EDE3"/>
  <text x="1390" y="309" class="sans navStrong">Ask</text>
  <rect x="1368" y="338" width="76" height="42" rx="21" fill="#F3EDE3"/>
  <text x="1385" y="365" class="sans navStrong">Dump</text>
  <rect x="1368" y="394" width="76" height="42" rx="21" fill="#F3EDE3"/>
  <text x="1394" y="421" class="sans navStrong">Refs</text>

  <text x="928" y="968" class="sans small">The support tools stay collapsed. The concept remains the quiet center.</text>

  <text x="156" y="988" class="sans small">Direction H: quieter, less panelized, more like a sheet on a desk than a workspace dashboard.</text>
</svg>
