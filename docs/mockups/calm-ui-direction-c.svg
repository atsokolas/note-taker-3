<rect x="24" y="20" width="1552" height="64" rx="18" ry="18" fill="#101a2d" stroke="#22385d" stroke-width="2"/><text x="52" y="58" class="t" font-size="28" font-weight="700">Noeis</text><rect x="220" y="34" width="600" height="36" rx="14" ry="14" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="244" y="57" class="m" font-size="15" font-weight="400">Search only in current context</text><rect x="1270" y="34" width="100" height="36" rx="16" ry="16" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="1284" y="60" class="m" font-size="16" font-weight="600">Focus</text><rect x="1384" y="34" width="100" height="36" rx="16" ry="16" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="1398" y="60" class="m" font-size="16" font-weight="600">Profile</text><rect x="1496" y="34" width="72" height="36" rx="16" ry="16" fill="#17365d" stroke="#2a69a8" stroke-width="2"/><text x="1514" y="58" class="t" font-size="15" font-weight="700">Quit</text><text x="40" y="122" class="t" font-size="44" font-weight="700">Direction C: Stacked Workflow (Capture -&gt; Think -&gt; Review)</text><text x="40" y="158" class="m" font-size="20" font-weight="500">Task mode replaces route noise; each phase has one dominant question.</text><rect x="40" y="196" width="1520" height="70" rx="16" ry="16" fill="#101a2d" stroke="#22385d" stroke-width="2"/><rect x="70" y="210" width="332" height="42" rx="16" ry="16" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="84" y="236" class="m" font-size="16" font-weight="600">1 Capture</text><rect x="442" y="210" width="332" height="42" rx="16" ry="16" fill="#17365d" stroke="#22385d" stroke-width="2"/><text x="456" y="236" class="t" font-size="16" font-weight="600">2 Think</text><rect x="814" y="210" width="332" height="42" rx="16" ry="16" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="828" y="236" class="m" font-size="16" font-weight="600">3 Review</text><rect x="1186" y="210" width="332" height="42" rx="16" ry="16" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="1200" y="236" class="m" font-size="16" font-weight="600">4 Share</text><rect x="40" y="286" width="380" height="658" rx="18" ry="18" fill="#101a2d" stroke="#22385d" stroke-width="2"/><text x="66" y="324" class="m" font-size="16" font-weight="700">Current question</text><text x="66" y="356" class="t" font-size="28" font-weight="700">What are you trying</text><text x="66" y="392" class="t" font-size="28" font-weight="700">to decide right now?</text><rect x="66" y="446" width="328" height="74" rx="12" ry="12" fill="#13203a" stroke="#22385d" stroke-width="2"/><text x="84" y="488" class="t" font-size="18" font-weight="700">Research framing</text><rect x="66" y="540" width="328" height="74" rx="12" ry="12" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="84" y="582" class="m" font-size="18" font-weight="700">Open loops (3)</text><rect x="66" y="634" width="328" height="74" rx="12" ry="12" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="84" y="676" class="m" font-size="18" font-weight="700">Handoffs (1)</text><rect x="438" y="286" width="748" height="658" rx="18" ry="18" fill="#101a2d" stroke="#22385d" stroke-width="2"/><text x="468" y="324" class="t" font-size="28" font-weight="700">Main canvas</text><text x="468" y="356" class="m" font-size="16" font-weight="400">Only the active artifact is editable. Related elements become side references.</text><rect x="468" y="402" width="688" height="444" rx="14" ry="14" fill="#13203a" stroke="#22385d" stroke-width="2"/><line x1="500" y1="444" x2="1118" y2="444" stroke="#2a3f66" stroke-width="2"/><line x1="500" y1="472" x2="1118" y2="472" stroke="#2a3f66" stroke-width="2"/><line x1="500" y1="500" x2="1118" y2="500" stroke="#2a3f66" stroke-width="2"/><line x1="500" y1="528" x2="1118" y2="528" stroke="#2a3f66" stroke-width="2"/><line x1="500" y1="556" x2="1118" y2="556" stroke="#2a3f66" stroke-width="2"/><line x1="500" y1="584" x2="1118" y2="584" stroke="#2a3f66" stroke-width="2"/><line x1="500" y1="612" x2="1118" y2="612" stroke="#2a3f66" stroke-width="2"/><line x1="500" y1="640" x2="1118" y2="640" stroke="#2a3f66" stroke-width="2"/><line x1="500" y1="668" x2="1118" y2="668" stroke="#2a3f66" stroke-width="2"/><line x1="500" y1="696" x2="1118" y2="696" stroke="#2a3f66" stroke-width="2"/><line x1="500" y1="724" x2="1118" y2="724" stroke="#2a3f66" stroke-width="2"/><line x1="500" y1="752" x2="1118" y2="752" stroke="#2a3f66" stroke-width="2"/><line x1="500" y1="780" x2="1118" y2="780" stroke="#2a3f66" stroke-width="2"/><rect x="468" y="866" width="688" height="58" rx="12" ry="12" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="490" y="900" class="t" font-size="16" font-weight="400">Command bar: /insert /link /handoff /summarize</text><rect x="1204" y="286" width="356" height="658" rx="18" ry="18" fill="#101a2d" stroke="#22385d" stroke-width="2"/><text x="1232" y="324" class="t" font-size="28" font-weight="700">References</text><rect x="1232" y="380" width="302" height="114" rx="12" ry="12" fill="#13203a" stroke="#22385d" stroke-width="2"/><text x="1252" y="420" class="t" font-size="18" font-weight="700">Related notes</text><text x="1252" y="452" class="m" font-size="15" font-weight="400">Open as side sheet</text><rect x="1232" y="514" width="302" height="114" rx="12" ry="12" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="1252" y="554" class="m" font-size="18" font-weight="700">Source highlights</text><text x="1252" y="586" class="m" font-size="15" font-weight="400">Open as side sheet</text><rect x="1232" y="648" width="302" height="114" rx="12" ry="12" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="1252" y="688" class="m" font-size="18" font-weight="700">Thought partner</text><text x="1252" y="720" class="m" font-size="15" font-weight="400">Open as side sheet</text><rect x="1232" y="782" width="302" height="114" rx="12" ry="12" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="1252" y="82