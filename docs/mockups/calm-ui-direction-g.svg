<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" fill="none">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1600" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F3EA"/>
      <stop offset="1" stop-color="#F1E8DA"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#F7F0E4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#AF9C81" flood-opacity="0.16"/>
    </filter>
  </defs>

  <style>
    .serif { font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif; }
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .title { font-size: 18px; font-weight: 700; fill: #624E35; }
    .label { font-size: 12px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; fill: #8B7356; }
    .body { font-size: 16px; font-weight: 500; fill: #5E513F; }
    .small { font-size: 13px; font-weight: 500; fill: #907E67; }
    .muted { font-size: 14px; font-weight: 500; fill: #A18E74; }
    .chip { font-size: 13px; font-weight: 700; fill: #6D583E; }
    .nav { font-size: 15px; font-weight: 600; fill: #6A5945; }
    .navActive { font-size: 15px; font-weight: 700; fill: #352A1E; }
    .heroTitle { font-size: 56px; font-weight: 700; fill: #35281B; }
    .heroSub { font-size: 22px; font-weight: 500; fill: #6A5945; }
    .sectionTitle { font-size: 28px; font-weight: 700; fill: #433425; }
    .cardTitle { font-size: 19px; font-weight: 700; fill: #473728; }
    .outlineTitle { font-size: 18px; font-weight: 700; fill: #4D3D2B; }
    .outlineBody { font-size: 16px; font-weight: 500; fill: #5E513F; }
  </style>

