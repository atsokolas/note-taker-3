th="2"/><text x="760" y="302" class="m" font-size="16" font-weight="600">Notebook</text><rect x="896" y="276" width="128" height="42" rx="16" ry="16" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="910" y="302" class="m" font-size="16" font-weight="600">Concepts</text><rect x="1046" y="276" width="88" height="42" rx="16" ry="16" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="1060" y="302" class="m" font-size="16" font-weight="600">+ New</text><rect x="596" y="344" width="626" height="148" rx="16" ry="16" fill="#13203a" stroke="#22385d" stroke-width="2"/><text x="620" y="380" class="t" font-size="28" font-weight="700">Continue one thread</text><text x="620" y="412" class="m" font-size="16" font-weight="400">Only one prominent CTA. Secondary actions move into command menu.</text><rect x="620" y="440" width="500" height="36" rx="10" ry="10" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="638" y="463" class="t" font-size="16" font-weight="400">Research Paper Analysis</text><rect x="596" y="516" width="626" height="254" rx="16" ry="16" fill="#13203a" stroke="#22385d" stroke-width="2"/><text x="620" y="552" class="t" font-size="28" font-weight="700">Working set (condensed)</text><rect x="620" y="592" width="180" height="138" rx="12" ry="12" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="634" y="616" class="m" font-size="16" font-weight="700">Notebook</text><text x="634" y="646" class="t" font-size="16" font-weight="400">Item 1</text><text x="634" y="672" class="m" font-size="16" font-weight="400">Item 2</text><text x="634" y="698" class="m" font-size="16" font-weight="400">Item 3</text><rect x="816" y="592" width="180" height="138" rx="12" ry="12" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="830" y="616" class="m" font-size="16" font-weight="700">Concepts</text><text x="830" y="646" class="t" font-size="16" font-weight="400">Item 1</text><text x="830" y="672" class="m" font-size="16" font-weight="400">Item 2</text><text x="830" y="698" class="m" font-size="16" font-weight="400">Item 3</text><rect x="1012" y="592" width="180" height="138" rx="12" ry="12" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="1026" y="616" class="m" font-size="16" font-weight="700">Questions</text><text x="1026" y="646" class="t" font-size="16" font-weight="400">Item 1</text><text x="1026" y="672" class="m" font-size="16" font-weight="400">Item 2</text><text x="1026" y="698" class="m" font-size="16" font-weight="400">Item 3</text><rect x="596" y="794" width="626" height="130" rx="16" ry="16" fill="#13203a" stroke="#22385d" stroke-width="2"/><text x="620" y="830" class="a" font-size="20" font-weight="700">Rule: show one primary panel per vertical band.</text><text x="620" y="862" class="m" font-size="17" font-weight="400">Everything else is collapsed, deferred, or cmd-k searchable.</text><rect x="1270" y="196" width="300" height="748" rx="18" ry="18" fill="#101a2d" stroke="#22385d" stroke-width="2"/><text x="1290" y="226" class="m" font-size="18" font-weight="700">CONTEXT</text><rect x="1290" y="262" width="260" height="188" rx="14" ry="14" fill="#13203a" stroke="#22385d" stroke-width="2"/><text x="1312" y="294" class="t" font-size="24" font-weight="700">Working memory</text><text x="1312" y="328" class="m" font-size="16" font-weight="400">Collapsed by default.</text><text x="1312" y="356" class="m" font-size="16" font-weight="400">Expand only when needed.</text><rect x="1290" y="470" width="260" height="70" rx="14" ry="14" fill="#1a2a47" stroke="#22385d" stroke-width="2"/><text x="1312" y="498" class="m" font-size="16" font-weight="400">Thought partner hidden</text><text x="1312" y="520" class="m" font-size="16" font-weight="400">until explicit invoke</text></svg>